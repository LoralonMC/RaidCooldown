name: RaidCooldown
version: '${version}'
main: dev.oakheart.raidcooldown.RaidCooldown
description: 'Adds configurable cooldowns to raids with persistent storage.'
api-version: '1.21.10'
authors:
  - Loralon
website: https://github.com/LoralonMC/RaidCooldown
dependencies:
  server:
    PlaceholderAPI:
      load: BEFORE
      required: false
permissions:
  raidcooldown.*:
    description: 'All RaidCooldown permissions'
    default: op
    children:
      raidcooldown.check: true
      raidcooldown.reset: true
      raidcooldown.reload: true
      raidcooldown.info: true
      raidcooldown.bypass: true
  raidcooldown.check:
    description: 'Check other players raid cooldown status'
    default: op
  raidcooldown.reset:
    description: 'Reset another players raid cooldown'
    default: op
  raidcooldown.reload:
    description: 'Reload configuration'
    default: op
  raidcooldown.info:
    description: 'View plugin information and statistics'
    default: op
  raidcooldown.bypass:
    description: 'Bypass raid cooldowns entirely'
    default: false
